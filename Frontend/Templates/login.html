<!DOCTYPE html>
<html>

<head>

<title>Login - SkillBridge</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>


<body>


<div class="form-container">


<h1>
Login
</h1>



<form method="POST">


<input
type="email"

required>

</button>


</form>



<p>
New user?

Create Account
</a>

</p>



</div>


</body>

</html>
